## esp-harness-core — reusable console protocol + LVGL scene framework
##
## Renamed from `aurora-harness` in esp-harness v3.0. Same headers,
## same library, just a name that doesn't lie about its purpose: it's
## the framework's C runtime, not Aurora-specific.
##
## A drop-in scaffold module for any ESP-IDF + LVGL project that wants:
##   - line-protocol console (OK / ERR / EVT + payload framing)
##   - LVGL scene framework (deck of full-screen views w/ lifecycle hooks)
##   - opt-in default command set (?stat / scene / tap / swipe / ?dump)
##   - toast + progress overlay primitives
##
## Vendor via:
##   list(APPEND EXTRA_COMPONENT_DIRS path/to/esp-harness/components)
##   # then in your main/CMakeLists.txt: REQUIRES esp-harness-core
##
## Post-registry-publish:
##   dependencies:
##     caldis/esp-harness-core: "^2.0.0"

version: "2.0.0"
description: |
  Reusable console protocol + LVGL scene framework for AI-driven
  ESP32 dev loops. The C runtime layer of the esp-harness project
  (Python toolkit + sim live at tools/esp-harness/ and examples/).

url: https://github.com/Caldis/esp-harness/tree/master/components/esp-harness-core
issues: https://github.com/Caldis/esp-harness/issues
license: "MIT"

## Supported chip targets — board-agnostic but currently only field-tested
## on ESP32-S3. PRs welcomed for additional targets.
targets:
  - esp32s3

## Tag the component for searchability post-publish.
tags:
  - lvgl
  - console
  - scene-framework
  - ai-loop
  - testing
  - harness

dependencies:
  idf: ">=5.0"
  lvgl/lvgl: ">=9.0"

files:
  exclude:
    - "PORTING.md"        # docs only, not needed at consumer link time
    - "README.md"
