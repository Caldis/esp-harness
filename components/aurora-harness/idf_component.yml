## aurora-harness — reusable console protocol + LVGL scene framework
##
## A drop-in scaffold module for any ESP-IDF + LVGL project that wants:
##   - line-protocol console (OK / ERR / EVT + payload framing)
##   - LVGL scene framework (deck of full-screen views w/ lifecycle hooks)
##   - opt-in default command set (?stat / scene / tap / swipe / ?dump)
##   - toast + progress overlay primitives
##
## Today (v1.4) this component is not yet on the IDF Component Registry.
## Vendor it via path:
##
##   list(APPEND EXTRA_COMPONENT_DIRS path/to/esp32-harness-showcase/components)
##
## After registry publication (planned, no ETA), the same component will
## be reachable via:
##
##   # In your project's main/idf_component.yml:
##   dependencies:
##     caldis/aurora-harness: "^1.4.0"
##
## Either form gives the same headers + sources.

version: "1.4.0"
description: |
  Reusable console protocol + LVGL scene framework for AI-driven
  ESP32 dev loops. Used by esp32-harness-showcase (the reference
  firmware) and the esp32-harness-toolkit Python CLI.

url: https://github.com/Caldis/esp32-harness-showcase/tree/master/components/aurora-harness
issues: https://github.com/Caldis/esp32-harness-showcase/issues
license: "MIT"

## Supported chip targets — board-agnostic but currently only field-tested
## on ESP32-S3. PRs welcomed for additional targets.
targets:
  - esp32s3

## Tag the component for searchability post-publish.
tags:
  - lvgl
  - console
  - scene-framework
  - ai-loop
  - testing
  - harness

dependencies:
  idf: ">=5.0"
  lvgl/lvgl: ">=9.0"

files:
  exclude:
    - "PORTING.md"        # docs only, not needed at consumer link time
    - "README.md"
